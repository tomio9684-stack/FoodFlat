<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodFlat – Rider Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #C84B11; --primary-light: #E8652A;
  --brown: #3B1F0E; --cream: #FDF6EE; --cream-dark: #F0E4D4;
  --text: #1A0A00; --text-mid: #5A3A20; --text-muted: #9A7A60;
  --white: #fff; --shadow: 0 4px 20px rgba(58,31,14,0.12);
  --blue: #1d4ed8; --blue-bg: rgba(59,130,246,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); max-width:420px; margin:0 auto; min-height:100vh; }

.topbar { background:var(–brown); padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:38px; height:38px; border-radius:50%; background:var(–primary); display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo-text .name { font-family:‘Playfair Display’,serif; font-size:18px; color:var(–white); font-weight:800; }
.logo-text .tag { font-size:10px; color:rgba(255,255,255,0.5); }
.nav-links { display:flex; gap:8px; }
.nav-link { color:rgba(255,255,255,0.7); font-size:12px; font-weight:600; text-decoration:none; padding:6px 12px; border-radius:20px; border:1px solid rgba(255,255,255,0.2); transition:all 0.2s; }
.nav-link:hover { background:rgba(255,255,255,0.15); color:white; }

.page-hero { background:linear-gradient(135deg, #1d4ed8, #1e3a8a); padding:24px 20px; }
.page-hero h1 { font-family:‘Playfair Display’,serif; font-size:24px; color:var(–white); margin-bottom:4px; }
.page-hero p { font-size:13px; color:rgba(255,255,255,0.6); }

.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:16px; }
.stat-card { background:var(–white); border-radius:14px; padding:14px; text-align:center; box-shadow:var(–shadow); }
.stat-num { font-family:‘Playfair Display’,serif; font-size:26px; color:var(–blue); font-weight:700; }
.stat-label { font-size:11px; color:var(–text-muted); margin-top:2px; }

.section-title { font-size:16px; font-weight:700; padding:4px 16px 12px; }

.orders-list { padding:0 16px 100px; display:flex; flex-direction:column; gap:12px; }

.order-card { background:var(–white); border-radius:18px; padding:16px; box-shadow:var(–shadow); border-left:4px solid var(–blue); animation:fadeIn 0.3s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.order-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.order-id { font-size:11px; color:var(–text-muted); font-weight:600; }
.ready-badge-chip { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; background:rgba(34,197,94,0.1); color:#15803d; }

.order-food { font-size:16px; font-weight:700; margin-bottom:4px; }
.order-address { font-size:13px; color:var(–text-muted); margin-bottom:12px; }

.map-mini { background:linear-gradient(135deg,#d4e8c2,#b8d4a0); border-radius:12px; height:80px; display:flex; align-items:center; justify-content:center; margin-bottom:12px; position:relative; overflow:hidden; }
.map-mini::before { content:’’; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 20px,rgba(255,255,255,0.2) 20px,rgba(255,255,255,0.2) 21px),repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(255,255,255,0.2) 20px,rgba(255,255,255,0.2) 21px); }
.map-mini-label { background:white; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:700; color:var(–brown); box-shadow:0 2px 8px rgba(0,0,0,0.15); z-index:1; }

.deliver-btn { width:100%; background:var(–blue); color:white; border:none; cursor:pointer; font-family:‘DM Sans’,sans-serif; font-size:14px; font-weight:700; padding:12px; border-radius:12px; transition:opacity 0.2s; }
.deliver-btn:hover { opacity:0.85; }

.empty-state { text-align:center; padding:60px 20px; color:var(–text-muted); }
.empty-state .ei { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:15px; color:var(–text-mid); margin-bottom:6px; }

.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:420px; background:var(–white); border-top:1px solid var(–cream-dark); display:flex; justify-content:space-around; padding:10px 0 20px; z-index:100; box-shadow:0 -4px 20px rgba(58,31,14,0.08); }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:600; color:var(–text-muted); text-decoration:none; transition:color 0.2s; }
.nav-item.active { color:var(–primary); }
.nav-icon { font-size:22px; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(–blue); color:white; padding:12px 22px; border-radius:50px; font-size:14px; font-weight:600; z-index:500; transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🛵</div>
    <div class="logo-text"><div class="name">FoodFlat</div><div class="tag">Rider Panel</div></div>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Customer</a>
    <a class="nav-link" href="vendor.html">Vendor</a>
    <a class="nav-link" href="admin.html">Admin</a>
  </div>
</div>

<div class="page-hero">
  <h1>🛵 Rider Panel</h1>
  <p>Pick up ready orders and mark them delivered</p>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="statReady">0</div><div class="stat-label">Ready for Pickup</div></div>
  <div class="stat-card"><div class="stat-num" id="statDelivered">0</div><div class="stat-label">Delivered Today</div></div>
</div>

<div class="section-title">Ready for Pickup 📦</div>
<div class="orders-list" id="ordersList"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a class="nav-item" href="vendor.html"><span class="nav-icon">🏪</span><span>Vendor</span></a>
  <a class="nav-item active" href="rider.html"><span class="nav-icon">🛵</span><span>Rider</span></a>
  <a class="nav-item" href="admin.html"><span class="nav-icon">⚙️</span><span>Admin</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
function load() {
  fetch('/orders')
    .then(res => res.json())
    .then(data => {
      const ready = data.filter(o => o.status === 'ready' || o.status === 'rider assigned');
      const delivered = data.filter(o => o.status === 'delivered');
      document.getElementById('statReady').textContent = ready.length;
      document.getElementById('statDelivered').textContent = delivered.length;

      const list = document.getElementById('ordersList');
      if (ready.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="ei">🛵</div><p>No pickups yet</p><span style="font-size:13px">Orders marked ready by vendors will appear here</span></div>`;
        return;
      }

      list.innerHTML = ready.map(o => `
        <div class="order-card">
          <div class="order-card-top">
            <span class="order-id">Order #${String(o.id).slice(-6)}</span>
            <span class="ready-badge-chip">✅ Ready</span>
          </div>
          <div class="order-food">${o.food}</div>
          <div class="order-address">📍 ${o.address}</div>
          <div class="map-mini"><div class="map-mini-label">🛵 En route to ${o.address}</div></div>
          <button class="deliver-btn" onclick="deliver(${o.id})">🎉 Mark as Delivered</button>
        </div>`).join('');
    });
}

function deliver(id) {
  fetch('/deliver/' + id, { method: 'POST' })
    .then(() => { showToast('Order delivered! 🎉'); load(); });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
