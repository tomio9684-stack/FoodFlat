<!DOCTYPE html>
<html>
<head>
<title>Foodflat</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:#f6f6f6;
}

.header{
background:#5a2d0c;
color:white;
padding:18px;
font-size:22px;
text-align:center;
}

.search{
padding:15px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

.card{
background:white;
margin:15px;
padding:18px;
border-radius:14px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

button{
background:#ff6a00;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
font-size:15px;
}

</style>
</head>

<body>

<div class="header">
Foodflat — Order Food
</div>

<div class="search">
<input placeholder="Search food or restaurant">
</div>

<div class="card">

<h3>Mama T Amala</h3>

<p>25 mins • Delivery ₦800</p>

<button onclick="order()">
Order Now
</button>

</div>

<script>

function order(){

fetch("/order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

food:"Amala",

address:"Kola"

})

})
.then(res=>res.json())
.then(data=>{

alert("Order placed successfully")

})

}

</script>

</body>
</html>
