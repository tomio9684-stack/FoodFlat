<!DOCTYPE html>
<html>
<head>

<title>Vendor Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f6f6f6;
margin:0;
}

.header{
background:#5a2d0c;
color:white;
padding:18px;
text-align:center;
font-size:22px;
}

.order{
background:white;
margin:15px;
padding:18px;
border-radius:14px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

button{
background:#ff6a00;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
Vendor Dashboard
</div>

<div id="orders"></div>

<script>

function load(){

fetch("/orders")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(o=>{

html += `

<div class="order">

<h3>Order ${o.id}</h3>

<p>${o.food}</p>

<p>Status: ${o.status}</p>

<button onclick="ready(${o.id})">
Ready
</button>

</div>

`;

})

document.getElementById("orders").innerHTML=html;

})

}

function ready(id){

fetch("/ready/"+id,{

method:"POST"

})

load()

}

load()

</script>

</body>
</html>
