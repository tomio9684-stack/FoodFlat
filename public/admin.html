<!DOCTYPE html>
<html>
<head>

<title>Foodflat Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f6f6f6;
margin:0;
}

.header{
background:#5a2d0c;
color:white;
padding:18px;
text-align:center;
font-size:22px;
}

.card{
background:white;
margin:15px;
padding:18px;
border-radius:14px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

button{
background:#ff6a00;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
Admin Dashboard
</div>

<div class="card">

<h3>Set Delivery Fee</h3>

<input id="fee" placeholder="Enter amount">

<br><br>

<button onclick="setFee()">
Update Fee
</button>

</div>

<div id="orders"></div>

<script>

function load(){

fetch("/orders")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(o=>{

html += `

<div class="card">

<h3>Order ${o.id}</h3>

<p>${o.food}</p>

<p>Status: ${o.status}</p>

<button onclick="assign(${o.id})">
Assign Rider
</button>

</div>

`;

})

document.getElementById("orders").innerHTML=html;

})

}

function assign(id){

fetch("/assign-rider/"+id,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

rider:"Rider 1"

})

})

load()

}

function setFee(){

let fee =
document.getElementById("fee").value

fetch("/set-delivery-price",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

price:fee

})

})

}

load()

</script>

</body>
</html>
