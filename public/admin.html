<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodFlat – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#C84B11;--pl:#E8652A;--glow:rgba(200,75,17,0.22);--brown:#2C1508;--bm:#4A2010;--bl:#6B3520;--cream:#FDF6EE;--cd:#F0E4D4;--cm:#E8D5BE;--text:#1A0A00;--tm:#5A3A20;--mu:#9A7A60;--white:#fff;--green:#15803d;--gb:rgba(34,197,94,0.12);--ss:0 2px 8px rgba(44,21,8,0.08);--s:0 4px 24px rgba(44,21,8,0.13);--sl:0 8px 40px rgba(44,21,8,0.18);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;}

.topbar{background:var(–brown);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.35);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(–primary),var(–pl));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 14px var(–glow);}
.logo-text .name{font-family:‘Playfair Display’,serif;font-size:20px;font-weight:800;color:var(–white);letter-spacing:-0.5px;}
.logo-text .tag{font-size:10px;color:rgba(255,255,255,0.4);}
.np{color:rgba(255,255,255,0.6);font-size:11px;font-weight:600;text-decoration:none;padding:6px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);transition:all 0.2s;}
.np:hover{background:rgba(255,255,255,0.12);color:white;}

.page-hero{background:linear-gradient(135deg,var(–brown) 0%,var(–bm) 50%,var(–bl) 100%);padding:28px 22px;position:relative;overflow:hidden;}
.page-hero::before{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(200,75,17,0.2) 0%,transparent 70%);}
.page-hero::after{content:‘⚙️’;position:absolute;right:20px;bottom:-10px;font-size:80px;opacity:0.15;}
.page-hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:5px 12px;font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:12px;}
.page-hero h1{font-family:‘Playfair Display’,serif;font-size:26px;font-weight:800;color:var(–white);margin-bottom:4px;position:relative;}
.page-hero p{font-size:13px;color:rgba(255,255,255,0.5);position:relative;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px;}
.stat{background:var(–white);border-radius:14px;padding:12px 8px;text-align:center;box-shadow:var(–s);border:1.5px solid var(–cd);}
.stat-num{font-family:‘Playfair Display’,serif;font-size:22px;font-weight:700;color:var(–primary);}
.stat-label{font-size:10px;color:var(–mu);margin-top:2px;font-weight:600;}

.fee-card{background:var(–white);border-radius:20px;padding:20px;margin:0 16px 6px;box-shadow:var(–s);border:1.5px solid var(–cd);}
.fee-title{font-family:‘Playfair Display’,serif;font-size:18px;color:var(–brown);margin-bottom:4px;}
.fee-sub{font-size:12px;color:var(–mu);margin-bottom:14px;}
.fee-row{display:flex;gap:10px;align-items:center;}
.fee-input{flex:1;background:var(–cream);border:1.5px solid var(–cd);border-radius:12px;padding:12px 14px;font-family:‘DM Sans’,sans-serif;font-size:15px;color:var(–text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.fee-input:focus{border-color:var(–primary);box-shadow:0 0 0 3px var(–glow);}
.fee-btn{background:linear-gradient(135deg,var(–primary),var(–pl));color:white;border:none;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:700;padding:12px 16px;border-radius:12px;white-space:nowrap;transition:opacity 0.2s;}
.fee-btn:active{opacity:0.85;}
.current-fee{font-size:12px;color:var(–mu);margin-top:10px;}
.current-fee strong{color:var(–primary);font-size:14px;}

.sec-head{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 10px;}
.sec-head h2{font-family:‘Playfair Display’,serif;font-size:18px;color:var(–brown);}
.refresh-btn{background:none;border:none;color:var(–primary);font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:20px;background:rgba(200,75,17,0.08);}

.orders-list{padding:0 16px 100px;display:flex;flex-direction:column;gap:14px;}

.oc{background:var(–white);border-radius:20px;padding:18px;box-shadow:var(–s);border:1.5px solid var(–cd);border-left:5px solid var(–primary);animation:up 0.3s ease both;}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.oc-id{font-size:11px;color:var(–mu);font-weight:600;}
.chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.sp{background:rgba(200,75,17,0.12);color:var(–primary);}
.sr{background:var(–gb);color:var(–green);}
.sa{background:rgba(59,130,246,0.12);color:#1d4ed8;}
.sd{background:rgba(80,80,80,0.1);color:#555;}
.oc-food{font-size:16px;font-weight:700;margin-bottom:4px;}
.oc-addr{font-size:12px;color:var(–mu);margin-bottom:4px;}
.rider-badge{display:inline-flex;align-items:center;gap:5px;background:var(–cream);border:1px solid var(–cd);border-radius:20px;padding:4px 10px;font-size:12px;color:var(–tm);margin-bottom:10px;}

.breakdown{background:var(–cream);border-radius:12px;padding:12px;margin-bottom:14px;}
.br-row{display:flex;justify-content:space-between;font-size:13px;color:var(–tm);margin-bottom:4px;}
.br-total{display:flex;justify-content:space-between;font-size:15px;font-weight:800;border-top:1.5px solid var(–cd);padding-top:8px;margin-top:4px;}
.br-amt{color:var(–primary);font-family:‘Playfair Display’,serif;}

.assign-row{display:flex;gap:8px;}
.rider-sel{flex:1;background:var(–cream);border:1.5px solid var(–cd);border-radius:12px;padding:11px 12px;font-family:‘DM Sans’,sans-serif;font-size:13px;color:var(–text);outline:none;appearance:none;transition:border-color 0.2s;}
.rider-sel:focus{border-color:var(–primary);}
.assign-btn{background:linear-gradient(135deg,var(–primary),var(–pl));color:white;border:none;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:700;padding:11px 16px;border-radius:12px;transition:opacity 0.2s;}
.assign-btn:active{opacity:0.85;}
.assigned-badge{display:inline-flex;align-items:center;gap:6px;background:var(–gb);color:var(–green);font-size:13px;font-weight:700;padding:10px 14px;border-radius:12px;width:100%;justify-content:center;}
.delivered-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(80,80,80,0.08);color:#555;font-size:13px;font-weight:700;padding:10px 14px;border-radius:12px;width:100%;justify-content:center;}

.empty{text-align:center;padding:60px 20px;color:var(–mu);}
.empty-icon{font-size:56px;margin-bottom:14px;}
.empty p{font-size:15px;color:var(–tm);margin-bottom:6px;font-weight:600;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(–white);border-top:1.5px solid var(–cd);display:flex;justify-content:space-around;padding:10px 0 22px;z-index:100;box-shadow:0 -4px 24px rgba(44,21,8,0.1);}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(–mu);text-decoration:none;transition:color 0.2s;}
.ni.active{color:var(–primary);}
.niw{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.ni.active .niw{background:rgba(200,75,17,0.1);}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(–green);color:white;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;z-index:500;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:var(–sl);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(–primary);}
</style>

</head>
<body>

<div class="topbar">
  <a class="logo" href="index.html">
    <div class="logo-icon">🍛</div>
    <div class="logo-text"><div class="name">FoodFlat</div><div class="tag">Admin Panel</div></div>
  </a>
  <div style="display:flex;gap:6px;">
    <a class="np" href="index.html">Customer</a>
    <a class="np" href="rider.html">Rider</a>
  </div>
</div>

<div class="page-hero">
  <div class="page-hero-tag">⚙️ Admin Dashboard</div>
  <h1>Control Centre</h1>
  <p>Assign riders, manage orders & set delivery fees</p>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-num" id="sPending">0</div><div class="stat-label">Pending</div></div>
  <div class="stat"><div class="stat-num" id="sReady">0</div><div class="stat-label">Ready</div></div>
  <div class="stat"><div class="stat-num" id="sDone">0</div><div class="stat-label">Done</div></div>
</div>

<div class="fee-card">
  <div class="fee-title">💰 Delivery Fee</div>
  <div class="fee-sub">Set the delivery fee charged to all customers</div>
  <div class="fee-row">
    <input class="fee-input" id="priceInput" type="number" placeholder="e.g. 800">
    <button class="fee-btn" onclick="setPrice()">Update</button>
  </div>
  <div class="current-fee">Current fee: <strong id="currentFee">₦800</strong></div>
</div>

<div class="sec-head">
  <h2>All Orders</h2>
  <button class="refresh-btn" onclick="load()">↻ Refresh</button>
</div>
<div class="orders-list" id="ordersList"></div>

<nav class="bottom-nav">
  <a class="ni" href="index.html"><div class="niw">🏠</div><span>Home</span></a>
  <a class="ni" href="vendor.html"><div class="niw">🏪</div><span>Vendor</span></a>
  <a class="ni" href="rider.html"><div class="niw">🛵</div><span>Rider</span></a>
  <a class="ni active" href="admin.html"><div class="niw">⚙️</div><span>Admin</span></a>
</nav>
<div class="toast" id="toast"></div>

<script>
const RIDERS=['Rider Michael','Rider Chidi','Rider Tunde','Rider Emeka','Rider Fatima'];

function sc(s){return s==='pending'?'sp':s==='ready'?'sr':s==='rider assigned'?'sa':'sd';}
function si(s){return s==='pending'?'⏳':s==='ready'?'✅':s==='rider assigned'?'🛵':'🎉';}

function load(){
  fetch('/orders').then(r=>r.json()).then(data=>{
    document.getElementById('sTotal').textContent=data.length;
    document.getElementById('sPending').textContent=data.filter(o=>o.status==='pending').length;
    document.getElementById('sReady').textContent=data.filter(o=>o.status==='ready').length;
    document.getElementById('sDone').textContent=data.filter(o=>o.status==='delivered').length;
    const list=document.getElementById('ordersList');
    if(!data.length){
      list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>No orders yet</p><span style="font-size:13px">Customer orders will appear here</span></div>';
      return;
    }
    const opts=RIDERS.map(r=>`<option value="${r}">${r}</option>`).join('');
    list.innerHTML=data.slice().reverse().map(o=>`
      <div class="oc">
        <div class="oc-top"><span class="oc-id">Order #${String(o.id).slice(-6)}</span><span class="chip ${sc(o.status)}">${si(o.status)} ${o.status}</span></div>
        <div class="oc-food">${o.food}</div>
        <div class="oc-addr">📍 ${o.address}</div>
        <div class="rider-badge">👤 ${o.rider}</div>
        <div class="breakdown">
          <div class="br-row"><span>Food</span><span>₦${(o.foodPrice||0).toLocaleString()}</span></div>
          <div class="br-row"><span>Delivery fee</span><span>₦${(o.deliveryFee||0).toLocaleString()}</span></div>
          <div class="br-total"><span>Total</span><span class="br-amt">₦${(o.total||0).toLocaleString()}</span></div>
        </div>
        ${o.status==='pending'||o.status==='ready'
          ?`<div class="assign-row"><select class="rider-sel" id="r-${o.id}"><option value="">Select rider…</option>${opts}</select><button class="assign-btn" onclick="assign(${o.id})">Assign</button></div>`
          :o.status==='rider assigned'
          ?`<div class="assigned-badge">🛵 Rider en route</div>`
          :`<div class="delivered-badge">🎉 Delivered</div>`}
      </div>`).join('');
  });
}

function assign(id){
  const sel=document.getElementById('r-'+id);
  if(!sel?.value){showToast('Please select a rider first',true);return;}
  fetch('/assign-rider/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rider:sel.value})})
  .then(()=>{showToast('Rider assigned! 🛵');load();});
}

function setPrice(){
  const p=document.getElementById('priceInput').value;
  if(!p||isNaN(p)||Number(p)<0){showToast('Enter a valid price',true);return;}
  fetch('/set-delivery-price',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({price:Number(p)})})
  .then(r=>r.json()).then(data=>{
    document.getElementById('currentFee').textContent='₦'+data.price.toLocaleString();
    document.getElementById('priceInput').value='';
    showToast('Delivery fee updated to ₦'+data.price);
  });
}

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

load();setInterval(load,5000);
</script>

</body>
</html>
