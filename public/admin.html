<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodFlat – Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #C84B11; --primary-light: #E8652A;
  --brown: #3B1F0E; --brown-mid: #5C3317;
  --cream: #FDF6EE; --cream-dark: #F0E4D4;
  --text: #1A0A00; --text-mid: #5A3A20; --text-muted: #9A7A60;
  --white: #fff; --shadow: 0 4px 20px rgba(58,31,14,0.12);
  --green: #15803d; --green-bg: rgba(34,197,94,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); max-width:420px; margin:0 auto; min-height:100vh; }

.topbar { background:var(–brown); padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:38px; height:38px; border-radius:50%; background:var(–primary); display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo-text .name { font-family:‘Playfair Display’,serif; font-size:18px; color:var(–white); font-weight:800; }
.logo-text .tag { font-size:10px; color:rgba(255,255,255,0.5); }
.nav-links { display:flex; gap:8px; }
.nav-link { color:rgba(255,255,255,0.7); font-size:12px; font-weight:600; text-decoration:none; padding:6px 12px; border-radius:20px; border:1px solid rgba(255,255,255,0.2); transition:all 0.2s; }
.nav-link:hover { background:rgba(255,255,255,0.15); color:white; }

.page-hero { background:linear-gradient(135deg, var(–brown-mid), var(–brown)); padding:24px 20px; }
.page-hero h1 { font-family:‘Playfair Display’,serif; font-size:24px; color:var(–white); margin-bottom:4px; }
.page-hero p { font-size:13px; color:rgba(255,255,255,0.6); }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:16px; }
.stat-card { background:var(–white); border-radius:14px; padding:12px 8px; text-align:center; box-shadow:var(–shadow); }
.stat-num { font-family:‘Playfair Display’,serif; font-size:20px; color:var(–primary); font-weight:700; }
.stat-label { font-size:10px; color:var(–text-muted); margin-top:2px; }

/* DELIVERY FEE */
.fee-card { background:var(–white); border-radius:18px; padding:18px; margin:0 16px 20px; box-shadow:var(–shadow); }
.fee-card h3 { font-family:‘Playfair Display’,serif; font-size:16px; margin-bottom:12px; }
.fee-row { display:flex; gap:10px; align-items:center; }
.fee-input { flex:1; background:var(–cream); border:1px solid var(–cream-dark); border-radius:12px; padding:12px 14px; font-family:‘DM Sans’,sans-serif; font-size:15px; color:var(–text); outline:none; transition:border-color 0.2s; }
.fee-input:focus { border-color:var(–primary); }
.fee-btn { background:var(–primary); color:white; border:none; cursor:pointer; font-family:‘DM Sans’,sans-serif; font-size:14px; font-weight:700; padding:12px 18px; border-radius:12px; transition:background 0.2s; white-space:nowrap; }
.fee-btn:hover { background:var(–primary-light); }
.current-fee { font-size:12px; color:var(–text-muted); margin-top:8px; }
.current-fee span { color:var(–primary); font-weight:700; }

/* ORDERS */
.section-title { font-size:16px; font-weight:700; padding:4px 16px 12px; display:flex; justify-content:space-between; align-items:center; }
.refresh-btn { font-size:12px; color:var(–primary); background:none; border:none; cursor:pointer; font-family:‘DM Sans’,sans-serif; font-weight:600; }

.orders-list { padding:0 16px 100px; display:flex; flex-direction:column; gap:12px; }

.order-card { background:var(–white); border-radius:18px; padding:16px; box-shadow:var(–shadow); animation:fadeIn 0.3s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.order-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.order-id { font-size:11px; color:var(–text-muted); font-weight:600; }
.order-status { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; }
.status-pending { background:rgba(200,75,17,0.1); color:var(–primary); }
.status-ready { background:var(–green-bg); color:var(–green); }
.status-assigned { background:rgba(59,130,246,0.1); color:#1d4ed8; }
.status-delivered { background:rgba(100,100,100,0.1); color:#555; }

.order-food { font-size:15px; font-weight:700; margin-bottom:3px; }
.order-address { font-size:12px; color:var(–text-muted); margin-bottom:3px; }
.order-fee { font-size:12px; color:var(–primary); font-weight:600; margin-bottom:10px; }
.order-rider-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.rider-tag { font-size:12px; color:var(–text-mid); background:var(–cream); padding:4px 10px; border-radius:20px; }

.assign-section { display:flex; gap:8px; }
.rider-select { flex:1; background:var(–cream); border:1px solid var(–cream-dark); border-radius:10px; padding:10px 12px; font-family:‘DM Sans’,sans-serif; font-size:13px; color:var(–text); outline:none; appearance:none; transition:border-color 0.2s; }
.rider-select:focus { border-color:var(–primary); }
.assign-btn { background:var(–primary); color:white; border:none; cursor:pointer; font-family:‘DM Sans’,sans-serif; font-size:13px; font-weight:700; padding:10px 16px; border-radius:10px; transition:background 0.2s; white-space:nowrap; }
.assign-btn:hover { background:var(–primary-light); }
.assigned-badge { display:inline-flex; align-items:center; gap:6px; background:var(–green-bg); color:var(–green); font-size:12px; font-weight:700; padding:8px 12px; border-radius:10px; }

.empty-state { text-align:center; padding:60px 20px; color:var(–text-muted); }
.empty-state .ei { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:15px; color:var(–text-mid); }

.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:420px; background:var(–white); border-top:1px solid var(–cream-dark); display:flex; justify-content:space-around; padding:10px 0 20px; z-index:100; box-shadow:0 -4px 20px rgba(58,31,14,0.08); }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:600; color:var(–text-muted); text-decoration:none; transition:color 0.2s; }
.nav-item.active { color:var(–primary); }
.nav-icon { font-size:22px; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:#2E7D32; color:white; padding:12px 22px; border-radius:50px; font-size:14px; font-weight:600; z-index:500; transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.err { background:var(–primary); }
</style>

</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⚙️</div>
    <div class="logo-text"><div class="name">FoodFlat</div><div class="tag">Admin Panel</div></div>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Customer</a>
    <a class="nav-link" href="vendor.html">Vendor</a>
    <a class="nav-link" href="rider.html">Rider</a>
  </div>
</div>

<div class="page-hero">
  <h1>⚙️ Admin Dashboard</h1>
  <p>Manage orders, riders and delivery pricing</p>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Total</div></div>
  <div class="stat-card"><div class="stat-num" id="sPending">0</div><div class="stat-label">Pending</div></div>
  <div class="stat-card"><div class="stat-num" id="sReady">0</div><div class="stat-label">Ready</div></div>
  <div class="stat-card"><div class="stat-num" id="sDone">0</div><div class="stat-label">Done</div></div>
</div>

<!-- DELIVERY FEE -->

<div class="fee-card">
  <h3>💰 Set Delivery Fee</h3>
  <div class="fee-row">
    <input class="fee-input" id="priceInput" type="number" placeholder="e.g. 800">
    <button class="fee-btn" onclick="setPrice()">Update Fee</button>
  </div>
  <div class="current-fee">Current fee: <span id="currentFee">₦800</span></div>
</div>

<!-- ORDERS -->

<div class="section-title">
  All Orders
  <button class="refresh-btn" onclick="load()">↻ Refresh</button>
</div>
<div class="orders-list" id="ordersList"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a class="nav-item" href="vendor.html"><span class="nav-icon">🏪</span><span>Vendor</span></a>
  <a class="nav-item" href="rider.html"><span class="nav-icon">🛵</span><span>Rider</span></a>
  <a class="nav-item active" href="admin.html"><span class="nav-icon">⚙️</span><span>Admin</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
const RIDERS = ['Rider Michael', 'Rider Chidi', 'Rider Tunde', 'Rider Emeka', 'Rider Fatima'];

function statusClass(s) {
  if (s === 'pending') return 'status-pending';
  if (s === 'ready') return 'status-ready';
  if (s === 'rider assigned') return 'status-assigned';
  if (s === 'delivered') return 'status-delivered';
  return 'status-pending';
}
function statusIcon(s) {
  if (s === 'pending') return '⏳';
  if (s === 'ready') return '✅';
  if (s === 'rider assigned') return '🛵';
  if (s === 'delivered') return '🎉';
  return '⏳';
}

function load() {
  fetch('/orders')
    .then(res => res.json())
    .then(data => {
      document.getElementById('sTotal').textContent = data.length;
      document.getElementById('sPending').textContent = data.filter(o => o.status === 'pending').length;
      document.getElementById('sReady').textContent = data.filter(o => o.status === 'ready').length;
      document.getElementById('sDone').textContent = data.filter(o => o.status === 'delivered').length;

      const list = document.getElementById('ordersList');
      if (data.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="ei">📋</div><p>No orders yet</p><span style="font-size:13px">Customer orders will appear here</span></div>';
        return;
      }

      const riderOptions = RIDERS.map(r => `<option value="${r}">${r}</option>`).join('');

      list.innerHTML = data.slice().reverse().map(o => `
        <div class="order-card">
          <div class="order-card-top">
            <span class="order-id">Order #${String(o.id).slice(-6)}</span>
            <span class="order-status ${statusClass(o.status)}">${statusIcon(o.status)} ${o.status}</span>
          </div>
          <div class="order-food">${o.food}</div>
          <div class="order-address">📍 ${o.address}</div>
          <div class="order-fee">🛵 Delivery Fee: ₦${o.deliveryFee}</div>
          <div class="order-rider-row"><span class="rider-tag">👤 ${o.rider}</span></div>
          ${o.status === 'pending' || o.status === 'ready'
            ? `<div class="assign-section">
                <select class="rider-select" id="rider-${o.id}">
                  <option value="">Select a rider…</option>
                  ${riderOptions}
                </select>
                <button class="assign-btn" onclick="assign(${o.id})">Assign</button>
               </div>`
            : o.status === 'rider assigned'
            ? `<div class="assigned-badge">🛵 Rider en route</div>`
            : `<div class="assigned-badge">🎉 Delivered</div>`}
        </div>`).join('');
    });
}

function assign(id) {
  const select = document.getElementById('rider-' + id);
  const rider = select?.value;
  if (!rider) { showToast('Please select a rider first', true); return; }
  fetch('/assign-rider/' + id, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rider })
  }).then(() => { showToast('Rider assigned! 🛵'); load(); });
}

function setPrice() {
  const price = document.getElementById('priceInput').value;
  if (!price || isNaN(price) || Number(price) < 0) { showToast('Enter a valid price', true); return; }
  fetch('/set-delivery-price', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ price: Number(price) })
  }).then(res => res.json())
    .then(data => {
      document.getElementById('currentFee').textContent = '₦' + data.price.toLocaleString();
      document.getElementById('priceInput').value = '';
      showToast('Delivery fee updated to ₦' + data.price);
    });
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (err ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
